default:
  image: python:3.14

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DEFAULT_PYTHON_VERSION: "3.14"

cache:
  paths:
    - .cache/pip

#Linting stage to check code style with Black
lint:
  stage: lint
  script:
    - pip install black
    - black --check --diff .
  allow_failure: false

#Linting stage to check code style with pylint
pylint:
  stage: lint
  script:
    - pip install -e .
    - pip install pylint pylint-exit anybadge
    - pylint cosmologix/*.py | tee pylint.txt || pylint-exit $?
    - score=$(sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' pylint.txt)
    - echo "Pylint score was $score"
    - anybadge -l pylint -v $score -f pylint.svg 2=red 4=orange 8=yellow 10=green
  artifacts:
    paths:
      - pylint.svg

# Testing stage to run your tests on multiple Python versions
test:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]
  image: python:$PYTHON_VERSION
  variables:
    # jaxlib 0.9.x cp311 wheels are AOT-compiled with CPU features (+prefer-no-gather,
    # +prefer-no-scatter) absent on some runners, causing NaN results. Disabling the
    # thunk runtime forces XLA to JIT-compile for the actual host CPU instead of
    # loading the pre-compiled AOT executables.
    XLA_FLAGS: "--xla_cpu_use_thunk_runtime=false"
  script:
    - pip install -e .[test]
    - pytest -v --junitxml=report.xml --cov-report=term --cov-report xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    paths:
      - report.xml
      - coverage.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: false

# Building the package stage
build:
  stage: build
  script:
    - pip install setuptools wheel build
    - python -m build --sdist --wheel
    - ls -l dist/
  artifacts:
    expire_in: 1 week
    paths:
      - dist/*
  allow_failure: false

pypi:
  stage: deploy
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install twine
    - twine upload --non-interactive --repository --verbose pypi dist/*

pages:
  stage: deploy
  script:
    - apt-get update && apt-get install -y texlive texlive-latex-extra texlive-fonts-recommended dvipng cm-super
    - pip install .[test]
    - pip install -U jupyter-book==1.0.4-post1 sphinx-autoapi anybadge
    - cd doc
    - python accuracy_plots.py
    - jupyter-book clean book
    - jupyter-book build book
    - mv book/_build/html ../public
    - cd ../
    - anybadge -l documentation -v available -f documentation.svg -c green
  artifacts:
    paths:
      - public
      - documentation.svg
